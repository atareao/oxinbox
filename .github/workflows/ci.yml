name: CI

on:
  pull_request:
    branches: [main, development]
  push:
    branches: [main, development]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu, wasm32-unknown-unknown
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy (native)
        run: cargo clippy --manifest-path backend/Cargo.toml -- -D warnings
      - name: Clippy (WASM)
        run: cargo clippy --target wasm32-unknown-unknown -p oxinbox-frontend -- -D warnings
      - name: Build native
        run: cargo build --release --manifest-path backend/Cargo.toml
      - name: Build frontend WASM
        run: cargo build --release --target wasm32-unknown-unknown -p oxinbox-frontend
      - name: Run tests
        run: cargo test --manifest-path backend/Cargo.toml