name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            archive: tar.gz
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev
      - name: Build release
        run: cargo build --release --locked --target ${{ matrix.target }} -p oxinbox-backend
      - name: Prepare archive
        run: |
          BIN="target/${{ matrix.target }}/release/oxinbox-backend"
          PKG="oxinbox-backend-${{ matrix.target }}"
          cp "$BIN" "$PKG"
          tar czf "$PKG.tar.gz" "$PKG"
          echo "ARTIFACT=$PKG.tar.gz" >> $GITHUB_ENV
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT }}
          path: ${{ env.ARTIFACT }}

  release:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Generate release body
        run: |
          cat > notes.md <<'EOF'
          ## oxinbox-backend

          ### Downloads

          | Architecture | File |
          |---|---|
          EOF
          for f in *.tar.gz; do
            [ -f "$f" ] || continue
            arch=$(echo "$f" | sed 's/^oxinbox-backend-//; s/\.tar\.gz$//')
            echo "| \`$arch\` | \`$f\` |" >> notes.md
          done
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          body_path: notes.md
          files: "*.tar.gz"

  publish:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev
      - name: Publish oxinbox-core to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p oxinbox-core
      - name: Publish oxinbox-backend to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p oxinbox-backend