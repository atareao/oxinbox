version: "3.9"

services:
  db:
    image: paradedb/paradedb:latest
    environment:
      POSTGRES_USER: oxinbox
      POSTGRES_PASSWORD: oxinbox_dev
      POSTGRES_DB: oxinbox
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oxinbox"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3300:3300"
    environment:
      DATABASE_URL: postgres://oxinbox:oxinbox_dev@db:5432/oxinbox
      RP_ID: localhost
      RP_ORIGIN: http://localhost:3300
      AI_PROVIDER: openrouter
      AI_BASE_URL: https://openrouter.ai/api/v1
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-deepseek/deepseek-v4-flash}
      AI_EMBEDDING_MODEL: ${AI_EMBEDDING_MODEL:-baai/bge-m3}
      AI_WHISPER_MODEL: ${AI_WHISPER_MODEL:-qwen/qwen3-asr-flash-2026-02-10}
      RUST_LOG: info
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3300/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata: