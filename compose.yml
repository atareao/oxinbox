version: "3.9"

services:
  db:
    image: paradedb/paradedb:latest
    environment:
      POSTGRES_USER: oxinbox
      POSTGRES_PASSWORD: oxinbox_dev
      POSTGRES_DB: oxinbox
      POSTGRES_INITDB_ARGS: "--locale=C.UTF-8 --encoding=UTF8"
      LANG: C.UTF-8
      TZ: Europe/Madrid
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oxinbox"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth:
    image: pocketid/pocket-id:v2
    ports:
      - "8765:1411"
    volumes:
      - authdata:/app/data
    environment:
      APP_URL: http://localhost:8765
      ENCRYPTION_KEY: ${POCKETID_ENCRYPTION_KEY:?POCKETID_ENCRYPTION_KEY required}
      PUID: "1000"
      PGID: "1000"
      TRUST_PROXY: "false"
      DISABLE_RATE_LIMITING: "true"
      LOG_LEVEL: info
    healthcheck:
      test: ["CMD", "/app/pocket-id", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3300:3300"
    environment:
      DATABASE_URL: postgres://oxinbox:oxinbox_dev@db:5432/oxinbox
      OIDC_ISSUER_URL: http://auth:1411
      OIDC_CLIENT_ID: oxinbox
      AI_PROVIDER: openrouter
      AI_BASE_URL: https://openrouter.ai/api/v1
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-deepseek/deepseek-v4-flash}
      AI_EMBEDDING_MODEL: ${AI_EMBEDDING_MODEL:-baai/bge-m3}
      AI_WHISPER_MODEL: ${AI_WHISPER_MODEL:-qwen/qwen3-asr-flash-2026-02-10}
      RUST_LOG: info
      TZ: Europe/Madrid
    env_file:
      - path: ./oidc.env
        required: false
    depends_on:
      db:
        condition: service_healthy
      auth:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3300/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  authdata: